services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-myaichat}
      MYSQL_USER: ${DB_USER:-myaichat}
      MYSQL_PASSWORD: ${DB_PASSWORD:-myaichat}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  main:
    build:
      context: ./main
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      STORAGE_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-myaichat}
      DB_USER: ${DB_USER:-myaichat}
      DB_PASSWORD: ${DB_PASSWORD:-myaichat}
      DB_LOGGING: "false"
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      AGENT_SERVICE_URL: http://agent:8000
    depends_on:
      mysql:
        condition: service_healthy
      agent:
        condition: service_started
    ports:
      - "${PORT:-3000}:3000"

  agent:
    build:
      context: ./agent
    restart: unless-stopped
    environment:
      AGENT_RELOAD: ${AGENT_RELOAD:-false}
      AGENT_STORAGE_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-myaichat}
      DB_USER: ${DB_USER:-myaichat}
      DB_PASSWORD: ${DB_PASSWORD:-myaichat}
    volumes:
      - ./agent/app:/app/app
    depends_on:
      mysql:
        condition: service_healthy

  chat:
    build:
      context: ./chat
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    depends_on:
      - main
    ports:
      - "${CHAT_PORT:-8080}:80"

volumes:
  mysql-data:
