services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-myaichat}
      MYSQL_USER: ${DB_USER:-myaichat}
      MYSQL_PASSWORD: ${DB_PASSWORD:-myaichat}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  main:
    build:
      context: ./main
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      STORAGE_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-myaichat}
      DB_USER: ${DB_USER:-myaichat}
      DB_PASSWORD: ${DB_PASSWORD:-myaichat}
      DB_LOGGING: "false"
      DB_SYNC_ALTER: ${DB_SYNC_ALTER:-false}
      JWT_SECRET: ${JWT_SECRET:-your_admin_jwt_secret}
      JWT_ALGO: ${JWT_ALGO:-HS256}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_MAX_DAYS: ${LOG_MAX_DAYS:-15}
      AGENDA_DB_COLLECTION: ${AGENDA_DB_COLLECTION:-agenda_jobs}
      AGENDA_POOL_TIME: ${AGENDA_POOL_TIME:-5000}
      AGENDA_CONCURRENCY: ${AGENDA_CONCURRENCY:-20}
      API_BODY_LIMIT: ${API_BODY_LIMIT:-20mb}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      AGENT_SERVICE_URL: http://agent:8000
      NEO4J_URI: ${NEO4J_URI:-http://neo4j:7474}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      ROBOT_IMPORT_MAX_FILE_SIZE_MB: ${ROBOT_IMPORT_MAX_FILE_SIZE_MB:-100}
      ROBOT_GENERATION_CONCURRENCY: ${ROBOT_GENERATION_CONCURRENCY:-1}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-robot_knowledge}
      KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-}
      KNOWLEDGE_EMBEDDING_BASE_URL: ${KNOWLEDGE_EMBEDDING_BASE_URL:-}
      KNOWLEDGE_EMBEDDING_API_KEY: ${KNOWLEDGE_EMBEDDING_API_KEY:-}
      KNOWLEDGE_EMBEDDING_PROVIDER: ${KNOWLEDGE_EMBEDDING_PROVIDER:-}
    depends_on:
      mysql:
        condition: service_healthy
      agent:
        condition: service_started
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "${PORT:-3000}:3000"

  agent:
    build:
      context: ./agent
    restart: unless-stopped
    environment:
      AGENT_RELOAD: ${AGENT_RELOAD:-false}
      AGENT_STORAGE_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-myaichat}
      DB_USER: ${DB_USER:-myaichat}
      DB_PASSWORD: ${DB_PASSWORD:-myaichat}
    volumes:
      - ./agent/app:/app/app
    depends_on:
      mysql:
        condition: service_healthy
  chat:
    build:
      context: ./chat
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    depends_on:
      - main
    ports:
      - "${CHAT_PORT:-8080}:80"

  admin:
    build:
      context: ./admin
      args:
        VITE_ADMIN_API_BASE_URL: ${VITE_ADMIN_API_BASE_URL:-http://127.0.0.1:3000}
    restart: unless-stopped
    depends_on:
      - main
    ports:
      - "${ADMIN_PORT:-8081}:80"

  upload:
    build:
      context: ./upload
    restart: unless-stopped
    environment:
      UPLOAD_PORT: ${UPLOAD_PORT:-3001}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-myaichat-images}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-}
      MINIO_PUBLIC_READ: ${MINIO_PUBLIC_READ:-true}
      UPLOAD_MAX_FILE_SIZE_MB: ${UPLOAD_MAX_FILE_SIZE_MB:-10}
    depends_on:
      - minio
    ports:
      - "${UPLOAD_PORT:-3001}:3001"

volumes:
  mysql-data:
  minio-data:
  neo4j-data:
  qdrant-data:
